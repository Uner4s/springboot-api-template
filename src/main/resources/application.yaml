spring:
  application:
    name: backend

  # ── Base de datos ─────────────────────────────────────────────────────────
  # H2 en modo archivo — persiste entre reinicios, compatible con PostgreSQL.
  # Para cambiar a PostgreSQL en producción: reemplazar datasource, dialect,
  # y quitar las exclusiones de MongoDB si también se usa.
  datasource:
    url: jdbc:h2:file:./data/backend_db;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Consola H2 (dev) ──────────────────────────────────────────────────────
  h2:
    console:
      enabled: true
      path: /h2-console

  # ── MongoDB desactivado ───────────────────────────────────────────────────
  # Activar cuando se configure MONGODB_URI en el .env y se necesite Mongo.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration

# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}

# ── JWT ───────────────────────────────────────────────────────────────────────
security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
